services:
  docs:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  docs-dev:
    build:
      context: .
      target: deps
    command: npx docusaurus start --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./docs:/app/docs
      - ./src:/app/src
      - ./static:/app/static
      - ./docusaurus.config.ts:/app/docusaurus.config.ts
      - ./sidebars.ts:/app/sidebars.ts
    profiles:
      - dev
